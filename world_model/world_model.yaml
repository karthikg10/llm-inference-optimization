# World Model Hyperparameters
model:
  in_channels: 3
  latent_dim: 4
  hidden_dim: 256
  num_frames: 4

training:
  batch_size: 8
  num_epochs: 100
  learning_rate: 1e-4
  gradient_checkpointing: true
  mixed_precision: fp16

quantization:
  enabled: true
  precision: int8
  calibration_batches: 64

data:
  dataset: kinetics-400
  frame_size: [64, 64]
  sequence_length: 5
